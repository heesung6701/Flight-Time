name: Aircraft type map update
description: Add, update, or delete aircraft registration to type mappings.
title: "[aircraft-type-map] "
labels:
  - aircraft-type-map
body:
  - type: markdown
    attributes:
      value: |
        Use this form to update `data/aircraft-types.json`.

        **Add or update registrations**
        - Choose **Add or update registrations** above.
        - Enter one registration and one aircraft type per row.
        - Separate the registration and aircraft type with a tab, space, or comma.
        - Example: `HL8513 B73M`

        **Delete registrations**
        - Choose **Delete registrations** above.
        - Enter only one registration per row. Do not include an aircraft type.
        - Example: `HL8513`
  - type: dropdown
    id: change_type
    attributes:
      label: Change type
      description: Choose how the submitted rows should change the aircraft type map.
      options:
        - Add or update registrations
        - Delete registrations
    validations:
      required: true
  - type: textarea
    id: aircraft_type_map
    attributes:
      label: Aircraft type map
      description: |
        The rows are interpreted based on the Change type selected above.

        Add/update rows must include both values:
        `HL8513 B73M`
        `HL8514 A321`

        Delete rows must include only the registration:
        `HL8513`
        `HL8514`

        Do not paste the example labels ("Add/update" or "Delete") into this box.
      placeholder: |
        HL8513 B73M
        HL8514 A321
      render: tsv
    validations:
      required: true
