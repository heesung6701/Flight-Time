name: Aircraft type map update
description: Add, update, or delete aircraft registration to type mappings.
title: "[aircraft-type-map] "
labels:
  - aircraft-type-map
body:
  - type: markdown
    attributes:
      value: |
        Use this form to update `data/aircraft-types.json`.
        For add/update, enter one `registration type` pair per row.
        For delete, enter one registration per row.
  - type: dropdown
    id: change_type
    attributes:
      label: Change type
      description: Choose how the submitted rows should change the aircraft type map.
      options:
        - Add or update registrations
        - Delete registrations
    validations:
      required: true
  - type: textarea
    id: aircraft_type_map
    attributes:
      label: Aircraft type map
      description: |
        Add/update example:
        `HL8513 B73M`

        Delete example:
        `HL8513`
      placeholder: |
        HL8513
        HL8514
        HL8579
        HL8580
      render: tsv
    validations:
      required: true
