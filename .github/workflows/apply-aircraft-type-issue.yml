name: Apply aircraft type issue

on:
  issues:
    types:
      - opened
      - edited
      - reopened
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write

concurrency:
  group: aircraft-type-issue-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  apply:
    if: github.event_name == 'issues'
    runs-on: ubuntu-latest
    steps:
      - name: Detect and label aircraft type issue
        id: detect
        uses: actions/github-script@v7
        with:
          script: |
            const labelName = 'aircraft-type-map';
            const issue = context.payload.issue;
            const labels = issue.labels.map((label) => label.name);
            const matches = labels.includes(labelName)
              || issue.title.startsWith('[aircraft-type-map]')
              || issue.body.includes('### Aircraft type map');

            core.setOutput('matches', matches ? 'true' : 'false');
            if (!matches || labels.includes(labelName)) return;

            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: labelName,
              });
            } catch (error) {
              if (error.status !== 404) throw error;
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: labelName,
                color: '0E8A16',
                description: 'Updates data/aircraft-types.json from an issue form',
              });
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              labels: [labelName],
            });

      - name: Checkout
        if: steps.detect.outputs.matches == 'true'
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Node
        if: steps.detect.outputs.matches == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Apply aircraft type issue
        if: steps.detect.outputs.matches == 'true'
        env:
          AIRCRAFT_TYPE_ISSUE_SUMMARY: /tmp/aircraft-type-issue-summary.json
        run: node scripts/apply-aircraft-type-issue.mjs

      - name: Commit changes
        if: steps.detect.outputs.matches == 'true'
        id: commit
        run: |
          if git diff --quiet -- data/aircraft-types.json package.json package-lock.json index.html; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/aircraft-types.json package.json package-lock.json index.html
          git commit -m "chore: update aircraft type map from issue #${{ github.event.issue.number }}"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Resolve issue
        if: steps.detect.outputs.matches == 'true' && steps.commit.outputs.changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const sha = '${{ steps.commit.outputs.sha }}';
            const shortSha = sha.slice(0, 7);
            const commitUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/commit/${sha}`;
            const summary = JSON.parse(fs.readFileSync('/tmp/aircraft-type-issue-summary.json', 'utf8'));
            const list = (items, render) => items.length ? items.map(render).join('\n') : '- None';
            const finalMap = Object.entries(summary.finalMap)
              .map(([registration, aircraftType]) => `${registration}\t${aircraftType}`)
              .join('\n');
            const body = [
              `Aircraft type map was applied in commit ${shortSha}: ${commitUrl}`,
              '',
              '### Added',
              list(summary.changes.added, (item) => `- ${item.registration}: ${item.aircraftType}`),
              '',
              '### Updated',
              list(summary.changes.updated, (item) => `- ${item.registration}: ${item.from || '(empty)'} -> ${item.to}`),
              '',
              '### Deleted',
              list(summary.changes.deleted, (item) => `- ${item.registration}: ${item.aircraftType || '(empty)'}`),
              '',
              '### Final map',
              '```tsv',
              finalMap,
              '```',
              '',
              'Resolving this issue.',
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
              state_reason: 'completed',
            });

      - name: Comment on unchanged issue
        if: steps.detect.outputs.matches == 'true' && steps.commit.outputs.changed == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: 'Aircraft type map was already up to date. No commit was created.',
            });

      - name: Comment on failed issue
        if: failure() && steps.detect.outputs.matches == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let summary = {};
            try {
              summary = JSON.parse(fs.readFileSync('/tmp/aircraft-type-issue-summary.json', 'utf8'));
            } catch (error) {
              core.info(`No readable aircraft type issue summary: ${error.message}`);
            }

            if (summary.invalidInput) {
              const body = [
                '입력 형식 오류로 자동 처리할 수 없어 이슈를 닫습니다.',
                '',
                `실패 원인: ${summary.error}`,
                '',
                '등록번호와 기종을 각 행에 탭(또는 공백/쉼표)으로 구분해서 입력해 주세요.',
                '',
                '예시:',
                '',
                '```tsv',
                'HL8513\tB738',
                'HL8514\tA321',
                '```',
                '',
                '기종 정보를 포함해 새 이슈를 작성해 주세요.',
              ].join('\n');
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                state: 'closed',
                state_reason: 'not_planned',
              });
              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: 'Aircraft type map automation failed. Check the workflow logs for details.',
            });

  close-invalid-open-issues:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Close invalid open aircraft type issues
        uses: actions/github-script@v7
        with:
          script: |
            const labelName = 'aircraft-type-map';
            const invalidCommentMarker = '입력 형식 오류로 자동 처리할 수 없어 이슈를 닫습니다.';
            const section = (body, title) => {
              const escaped = title.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
              const match = String(body || '').match(new RegExp(`(?:^|\\n)### ${escaped}\\s*\\n+([\\s\\S]*?)(?=\\n### |$)`, 'i'));
              return match ? match[1].trim() : '';
            };
            const stripCodeFence = (text) => String(text || '')
              .split(/\r?\n/)
              .filter((line) => !line.trim().startsWith('```'))
              .join('\n')
              .trim();
            const normalizeRegistration = (value) => String(value || '').trim().toUpperCase().replace(/[^A-Z0-9-]/g, '');
            const normalizeAircraftType = (value) => String(value || '').trim().toUpperCase().replace(/[^A-Z0-9]/g, '');
            const invalidReason = (body) => {
              const mode = /delete/i.test(section(body, 'Change type')) ? 'delete' : 'upsert';
              const rows = stripCodeFence(section(body, 'Aircraft type map')).split(/\r?\n/);
              let found = false;
              for (const line of rows) {
                const trimmed = line.trim();
                if (!trimmed || /^A\/C\s*No/i.test(trimmed)) continue;
                const [registrationValue, typeValue = ''] = trimmed.split(/[\t,\s]+/);
                const registration = normalizeRegistration(registrationValue);
                const aircraftType = normalizeAircraftType(typeValue);
                if (!registration) continue;
                found = true;
                if (mode !== 'delete' && !aircraftType) return `Missing aircraft type for ${registration}`;
              }
              return found ? '' : 'No aircraft registrations found in issue body';
            };
            const invalidCommentBody = (reason) => [
              invalidCommentMarker,
              '',
              `실패 원인: ${reason}`,
              '',
              '등록번호와 기종을 각 행에 탭(또는 공백/쉼표)으로 구분해서 입력해 주세요.',
              '',
              '예시:',
              '',
              '```tsv',
              'HL8513\tB738',
              'HL8514\tA321',
              '```',
              '',
              '기종 정보를 포함해 새 이슈를 작성해 주세요.',
            ].join('\n');

            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: labelName,
              per_page: 100,
            });
            for (const issue of issues) {
              if (issue.pull_request) continue;
              const reason = invalidReason(issue.body || '');
              if (!reason) continue;
              const comments = await github.paginate(github.rest.issues.listComments, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                per_page: 100,
              });
              if (!comments.some((comment) => comment.body?.includes(invalidCommentMarker))) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  body: invalidCommentBody(reason),
                });
              }
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
                state_reason: 'not_planned',
              });
            }
